<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LowFireOS | Minimalist OS</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg-color); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 50px 20px;
        }

        nav { margin-bottom: 40px; background: var(--card-bg); padding: 5px; border-radius: 12px; display: flex; gap: 5px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        button { 
            background: transparent; 
            color: var(--text); 
            border: none; 
            padding: 12px 24px; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        button.active { background: var(--accent); color: var(--bg-color); }
        button:hover:not(.active) { background: #334155; }

        .content { width: 100%; max-width: 600px; text-align: center; }
        
        .tab-content { 
            display: none; 
            opacity: 0; 
            transition: opacity 0.5s ease-in-out; 
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }

        .tab-content.active { display: block; opacity: 1; }

        .download-btn { 
            display: inline-block; 
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: white; 
            padding: 18px 40px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold; 
            margin-top: 25px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .download-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4); 
        }
    </style>
</head>
<body>

    <nav>
        <button id="btn-about" class="active" onclick="showTab('about', 'btn-about')">About</button>
        <button id="btn-download" onclick="showTab('download', 'btn-download')">Download</button>
    </nav>

    <div class="content">
        <div id="about" class="tab-content active">
            <h1>Welcome to LowFireOS</h1>
            <p>LowFireOS is a lightweight, custom Linux distribution built for efficiency and performance.</p>
        </div>

        <div id="download" class="tab-content">
            <h1>Download</h1>
            <p>Get the latest version (2026.06.20) here.</p>
            <a href="https://github.com/Mikczak97/Lowfire-OS/releases/download/beta/lowfireos-2026.06.20.iso" class="download-btn">Download .ISO</a>
        </div>
    </div>

    <script>
        function showTab(tabId, btnId) {
            // Ukryj wszystkie zakładki
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            // Usuń klasę active z przycisków
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            
            // Pokaż wybraną
            document.getElementById(tabId).classList.add('active');
            document.getElementById(btnId).classList.add('active');
        }
    </script>
</body>
</html>
